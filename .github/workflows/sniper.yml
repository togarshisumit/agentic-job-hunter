name: Serverless Job Sniper

# Run automatically every 3 days at 10:00 AM UTC
on:
  schedule:
    - cron: '0 10 */3 * *'
  # Allows you to trigger it manually from the GitHub UI
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reconstruct token.json (For Gmail API)
        run: |
          echo "${{ secrets.GMAIL_TOKEN_JSON_BASE64 }}" | base64 --decode > token.json

      - name: Run Sniper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # The script will read data/master_resume.txt from the repository
        run: python sniper.py
