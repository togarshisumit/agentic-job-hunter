<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { 
        width: 350px; 
        font-family: 'Inter', sans-serif; 
        padding: 15px; 
        background: #0f172a; 
        color: white;
    }
    h2 { margin-top: 0; font-size: 1.2rem; }
    button { 
        width: 100%; 
        padding: 10px; 
        background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
        color: white; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        margin-bottom: 10px; 
        font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    .hidden { display: none; }
    #result { 
        margin-top: 15px; 
        background: rgba(30, 41, 59, 0.8); 
        padding: 12px; 
        border-radius: 8px; 
        font-size: 13px; 
        border: 1px solid #334155;
    }
    input {
        width: 100%; 
        padding: 10px; 
        margin-bottom: 10px; 
        box-sizing: border-box; 
        background: rgba(15, 23, 42, 0.6); 
        color: white; 
        border: 1px solid #334155; 
        border-radius: 8px;
    }
    .highlight { color: #a78bfa; font-weight: bold; }
  </style>
</head>
<body>
  <h2>🎯 Agentic Job Hunter</h2>
  <input type="text" id="company" placeholder="Company Name (Optional)">
  <button id="analyzeBtn">Analyze Job on this Page</button>
  <div id="loading" class="hidden">🧠 AI is analyzing the page... (takes ~15s)</div>
  <div id="result" class="hidden"></div>
  <script src="popup.js"></script>
</body>
</html>
